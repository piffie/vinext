name: Setup
description: Setup

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: "24"
  cache:
    description: Whether to enable caching for Vite+ dependencies
    required: false
    default: true
  run-install:
    description: Whether to run `vp install` after setup
    required: false
    default: true

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@b4d143e0e2de7151ab45dbc4b52b553025d123f2 # v1
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}
        run-install: ${{ inputs.run-install }}
